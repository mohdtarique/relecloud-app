name: CI/CD — Web App

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!FunctionApp/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-webapp:
    name: Deploy Web App
    uses: ./.github/workflows/reusable-deploy-webapp.yml
    with:
      environment: dev
      app_service_name: app-relecloud-dev-01
      resource_group: rg-relecloud-dev-appservice
      slot_name: staging
      dotnet_version: "8.0.x"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
